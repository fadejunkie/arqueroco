<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANTHONY | Stacking Dimes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
        function toggleTheme() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s; }
        h1, h2, h3 { font-family: 'Oswald', sans-serif; text-transform: uppercase; }
        .btn-orange { background-color: #FF5F1F; color: black; font-weight: bold; transition: 0.3s; }
        .btn-orange:hover { background-color: #e54e10; transform: translateY(-2px); }
    </style>
</head>
<body class="bg-white text-zinc-900 dark:bg-[#121212] dark:text-[#eeeeee]">

    <nav class="p-6 flex justify-between items-center border-b border-zinc-200 dark:border-white/10 sticky top-0 bg-white/90 dark:bg-[#121212]/90 backdrop-blur-md z-50">
        <div class="text-2xl font-bold tracking-tighter">ANTHONY<span class="text-[#FF5F1F]">.</span></div>
        <div class="hidden md:flex space-x-8 uppercase text-xs font-bold tracking-widest">
            <a href="shop.html" class="hover:text-[#FF5F1F]">Shop Merch</a>
            <a href="classes.html" class="hover:text-[#FF5F1F]">Book Classes</a>
        </div>
        <div class="flex items-center space-x-4">
            <button onclick="toggleTheme()" class="p-2 rounded-full bg-zinc-100 dark:bg-white/5">
                <span class="dark:hidden">🌙</span><span class="hidden dark:inline">☀️</span>
            </button>
            <a href="classes.html" class="btn-orange px-5 py-2 rounded text-xs uppercase tracking-widest">Book Now</a>
        </div>
    </nav>

    <section class="relative h-[85vh] flex items-center justify-center text-center overflow-hidden">
        <video id="heroVideo" autoplay muted loop playsinline class="absolute inset-0 w-full h-full object-cover z-0">
            <source src="http://googleusercontent.com/generated_video_content/11842524123238136500" type="video/mp4">
        </video>
        <div class="absolute inset-0 bg-black/50 dark:bg-black/60 z-10"></div>
        <div class="relative z-20 px-4">
            <h1 class="text-6xl md:text-9xl font-bold italic text-white drop-shadow-2xl mb-4">STACKING DIMES.</h1>
            <p class="text-xl text-gray-200 uppercase tracking-widest mb-8">Premium Gear • Fabrication Workshops</p>
            <div class="flex gap-4 justify-center">
                <a href="shop.html" class="btn-orange px-10 py-4 rounded text-lg uppercase">Shop Gear</a>
                <a href="classes.html" class="border border-white/50 text-white px-10 py-4 rounded text-lg uppercase hover:bg-white/10 transition">View Classes</a>
            </div>
        </div>
    </section>

    <script>
        window.addEventListener('load', () => { document.getElementById('heroVideo').play(); });
    </script>
</body>
</html>
